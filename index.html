<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Raport MII - Avan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #eef2f5; font-family: sans-serif; }
        .container { max-width: 800px; margin: auto; background: white; min-height: 100vh; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-2xl font-bold text-center mb-6">Aplikasi Raport & Absensi</h1>
    
    <div class="flex justify-center gap-2 mb-6">
        <button onclick="buka('raport')" class="bg-blue-600 text-white px-4 py-2 rounded">Raport</button>
        <button onclick="buka('absen')" class="bg-green-600 text-white px-4 py-2 rounded">Absensi</button>
    </div>

    <div id="raport" class="tab">
        <h2 class="text-xl font-bold">Menu Input Raport</h2>
        <p>Gunakan fitur input nilai seperti biasa di sini...</p>
    </div>

    <div id="absen" class="tab hidden">
        <h2 class="text-xl font-bold mb-4">Input Absensi Harian</h2>
        <input type="date" id="tgl" onchange="loadData()" class="border p-2 w-full mb-4">
        <div id="daftar-siswa"></div>
        <button onclick="simpanAbsen()" class="bg-green-600 text-white w-full py-2 mt-4 rounded">Simpan Data Absen</button>
    </div>

    <div class="mt-10 border-t pt-4">
        <marquee class="text-gray-500 font-bold">© Dikembangkan oleh Avan - Sistem Informasi Madrasah 2026</marquee>
    </div>
</div>

<script>
    // FUNGSI PINDAH TAB
    function buka(id) {
        document.getElementById('raport').classList.add('hidden');
        document.getElementById('absen').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // FUNGSI ABSEN SEDERHANA
    let siswa = JSON.parse(localStorage.getItem('ERAPORT_SISWA_NP')) || [];
    function loadData() {
        let h = "";
        siswa.forEach(s => {
            h += `<div class="flex justify-between p-2 border-b">${s.nama} 
                  <select class="status"><option>Hadir</option><option>Sakit</option><option>Izin</option><option>Alpha</option></select></div>`;
        });
        document.getElementById('daftar-siswa').innerHTML = h;
    }
    
    function simpanAbsen() { alert('Data Absen Tersimpan!'); }
    
    // Jalankan saat pertama buka
    loadData();
</script>

</body>
</html>
